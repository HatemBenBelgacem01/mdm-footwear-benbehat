name: CI/CD Footwear Classification

on:
  push:
    branches: [ "master" ] # Führt die Action aus, wenn in den master-branch gepusht wird

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Quellcode aus dem Repository auschecken

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }} # Nutzt deine hinterlegten DockerHub-Zugangsdaten
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Das Image wird gebaut (inkl. Maven-Build im Container) und hochgeladen
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mdm-footwear-benbehat:latest