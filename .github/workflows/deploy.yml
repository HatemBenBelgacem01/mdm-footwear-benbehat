name: CI/CD Footwear Classification

on:
  push:
    branches: [ "main" ] # Führt die Action aus, wenn du in den main-branch pushst

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Ersetze 'dein-benutzername' durch deinen echten DockerHub-Namen
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mdm-footwear-benbehat:latest