<!DOCTYPE html>
<html lang="de">
<head>
    <title>Footwear AI - Classification</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <div class="main-wrapper">
        <div class="container">
            <header class="text-center mb-5">
                <h1 class="display-4 fw-bold text-gradient">👟 Footwear AI BENBEHAT</h1>
                <p class="text-secondary">Präzise Schuh-Erkennung mittels Deep Learning (DJL)</p>
            </header>

            <div class="upload-container mb-4">
                <div id="drop-zone" class="drop-zone">
                    <div class="drop-zone-content">
                        <div class="upload-icon mb-3">
                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" class="bi bi-cloud-upload" viewBox="0 0 16 16">
                                <path fill-rule="evenodd" d="M4.406 1.342A5.53 5.53 0 0 1 8 0c2.69 0 4.923 2 5.166 4.579C14.758 4.804 16 6.137 16 7.773 16 9.569 14.502 11 12.687 11H10a.5.5 0 0 1 0-1h2.688C13.979 10 15 9.1 15 7.773c0-1.327-1.021-2.427-2.352-2.427a.5.5 0 0 1-.482-.356A4.53 4.53 0 0 0 8 1c-2.227 0-4.146 1.583-4.437 3.792a.5.5 0 0 1-.482.356A2.125 2.125 0 0 0 1 7.273C1 8.441 1.954 9.4 3.125 9.4H6a.5.5 0 0 1 0 1H3.125C1.393 10.4 0 9.007 0 7.273c0-1.532 1.103-2.793 2.582-3.085.495-2.035 2.222-3.124 3.824-3.124a.5.5 0 0 1 .482.356z"/>
                                <path fill-rule="evenodd" d="M7.646 5.146a.5.5 0 0 1 .708 0l2 2a.5.5 0 0 1-.708.708L8.5 6.707V10.5a.5.5 0 0 1-1 0V6.707L6.354 7.854a.5.5 0 1 1-.708-.708l2-2z"/>
                            </svg>
                        </div>
                        <h5>Bild hierher ziehen oder klicken</h5>
                        <p class="text-muted small">PNG, JPEG (Max. 10MB)</p>
                    </div>
                    <input type="file" id="image" accept="image/png, image/jpeg" class="drop-zone-input" onchange="checkFiles(this.files);">
                </div>
            </div>

            <div id="answerPart" class="results-card d-none">
                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="preview-box">
                            <h6 class="mb-3 fw-bold">Analysiertes Bild</h6>
                            <img id="preview" src="#" alt="Preview" class="img-fluid rounded shadow-sm">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div id="loadingPart" class="text-center py-5 d-none">
                            <div class="spinner-grow text-success" role="status"></div>
                            <p class="mt-3 text-muted">KI analysiert Bild...</p>
                        </div>

                        <div id="resultsPart" class="d-none">
                            <h6 class="mb-4 fw-bold">Klassifizierungsergebnisse</h6>
                            <div id="topResult" class="top-result-badge mb-4">
                                <div class="d-flex justify-content-between align-items-center">
                                    <span id="topLabel" class="h4 mb-0 fw-bold">---</span>
                                    <span id="topPercentage" class="badge rounded-pill bg-success fs-6">0%</span>
                                </div>
                            </div>
                            <div id="classificationList" class="other-results">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="historyContainer" class="history-section mt-5 d-none">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4">
                        <h4 class="mb-4 fw-bold">Analyse-Verlauf</h4>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th scope="col" style="width: 100px;">Bild</th>
                                        <th scope="col">Zeitpunkt</th>
                                        <th scope="col">Ergebnis</th>
                                        <th scope="col">Konfidenz</th>
                                    </tr>
                                </thead>
                                <tbody id="historyTableBody">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
